<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — ICP Mint Studio</title>
    <meta name="theme-color" content="#d4af37" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background-color: #0a0a0a;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 2rem;
        max-width: 400px;
      }

      .logo-diamond {
        width: 72px;
        height: 72px;
        position: relative;
      }

      .logo-wordmark {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #d4af37;
      }

      .logo-wordmark span {
        color: #f5f5f5;
      }

      .offline-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: #f5f5f5;
        margin-top: 0.5rem;
      }

      .offline-sub {
        font-size: 0.875rem;
        color: #888;
        line-height: 1.5;
      }

      .spinner-ring {
        width: 32px;
        height: 32px;
        border: 2px solid #2a2a2a;
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #2a2a2a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Diamond SVG logo -->
      <svg
        class="logo-diamond"
        viewBox="0 0 72 72"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <polygon
          points="36,4 68,28 36,68 4,28"
          fill="#d4af37"
          opacity="0.15"
        />
        <polygon
          points="36,4 68,28 36,68 4,28"
          fill="none"
          stroke="#d4af37"
          stroke-width="1.5"
        />
        <polygon
          points="36,12 60,28 36,58 12,28"
          fill="none"
          stroke="#d4af37"
          stroke-width="0.75"
          opacity="0.5"
        />
        <line x1="4" y1="28" x2="68" y2="28" stroke="#d4af37" stroke-width="0.75" opacity="0.4" />
        <line x1="36" y1="4" x2="36" y2="12" stroke="#d4af37" stroke-width="0.75" opacity="0.6" />
        <circle cx="36" cy="28" r="2" fill="#d4af37" opacity="0.8" />
      </svg>

      <div class="logo-wordmark">ICP <span>Mint Studio</span></div>

      <div class="divider"></div>

      <div>
        <p class="offline-title">You are offline</p>
        <p class="offline-sub" style="margin-top: 0.5rem">Checking connection&hellip;</p>
      </div>

      <div class="spinner-ring" role="status" aria-label="Reconnecting"></div>
    </div>

    <script>
      // Auto-reload when connection is restored
      window.addEventListener('online', () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
